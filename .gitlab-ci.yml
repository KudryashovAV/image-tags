stages: [deploy]
deploy:
  stage: deploy
  tags: [server-runner]
  variables:
    GIT_STRATEGY: none
  resource_group: image-tags
  only: 
    - main
  before_script:
    - set -euo pipefail
    - cd /srv/image-tags
    - '[ -d .git ] || { git init; git symbolic-ref HEAD refs/heads/main; }'
    - ENC_USER="${deploy_on_image_token:-}"
    - GIT_PASSWORD="${deploy_on_image_var:-}"
  script:
    - git fetch --prune "https://${ENC_USER}:${GIT_PASSWORD}@gitlab.com/a.kudryashov/image-tags.git" main
    - git reset --hard FETCH_HEAD
    - rm -f .env
    - cp $ENV_FILE .env
    - echo "" >> .env
    - cat $ENV_SYNH >> .env
    - echo "" >> .env
    - cat $SLACK_HOOK >> .env
    - echo "" >> .env
    - echo "TECH_WEBHOOK=$(cat $TECH_WEBHOOK | grep -oP '(?<=\")[^\"]+(?=\")')" >> .env
    - echo "OPENAI_API_KEY=$(cat $OPENAI_API_KEY | grep -oP '(?<=\")[^\"]+(?=\")')" >> .env
    - echo "GOOGLE_CLIENT_ID=$(cat $GOOGLE_CLIENT_ID | grep -oP '(?<=\")[^\"]+(?=\")')" >> .env
    - echo "GOOGLE_CLIENT_SECRET=$(cat $GOOGLE_CLIENT_SECRET | grep -oP '(?<=\")[^\"]+(?=\")')" >> .env
    - echo "GOOGLE_ACCESS_TOKEN=$(cat $GOOGLE_ACCESS_TOKEN | grep -oP '(?<=\")[^\"]+(?=\")')" >> .env
    - echo "GOOGLE_REFRESH_TOKEN=$(cat $GOOGLE_REFRESH_TOKEN | grep -oP '(?<=\")[^\"]+(?=\")')" >> .env
    - echo "GOOGLE_MASTER_SHEET_ID=$(cat $GOOGLE_MASTER_SHEET_ID | grep -oP '(?<=\")[^\"]+(?=\")')" >> .env
    - echo "SERPER_API_KEY=$(cat $SERPER_API_KEY | grep -oP '(?<=\")[^\"]+(?=\")')" >> .env
    - echo "GOOGLE_GENERATION_ROOT_FOLDER_ID=$(cat $GOOGLE_GENERATION_ROOT_FOLDER_ID | grep -oP '(?<=\")[^\"]+(?=\")')" >> .env
    - echo "CONFIG_FILE_ID=$(cat $CONFIG_FILE_ID | grep -oP '(?<=\")[^\"]+(?=\")')" >> .env
    - echo "SLACK_BOT_TOKEN=$(cat $SLACK_BOT_TOKEN | grep -oP '(?<=\")[^\"]+(?=\")')" >> .env
    - grep SLACK_BOT_TOKEN .env
    - echo " .env created"
    - echo " Installing dependencies (npm ci)..."
    - npm ci
    - rm -rf /srv/image-tags/.next
    - echo "Building..."
    - 'unset TECH_WEBHOOK OPENAI_API_KEY GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_ACCESS_TOKEN GOOGLE_REFRESH_TOKEN GOOGLE_MASTER_SHEET_ID SERPER_API_KEY GOOGLE_GENERATION_ROOT_FOLDER_ID CONFIG_FILE_ID SLACK_BOT_TOKEN && npm run build'
    - pm2 delete image-tags-app || true
    - 'unset TECH_WEBHOOK OPENAI_API_KEY GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_ACCESS_TOKEN GOOGLE_REFRESH_TOKEN GOOGLE_MASTER_SHEET_ID SERPER_API_KEY GOOGLE_GENERATION_ROOT_FOLDER_ID CONFIG_FILE_ID SLACK_BOT_TOKEN && pm2 start npm --name "image-tags-app" --cwd /srv/image-tags -- start'
    - pm2 save