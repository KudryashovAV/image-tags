stages: [deploy]
deploy:
  stage: deploy
  tags: [server-runner]
  variables:
    GIT_STRATEGY: none
  resource_group: image-tags
  only: 
    - main
  before_script:
    - set -euo pipefail
    - cd /srv/image-tags
    - '[ -d .git ] || { git init; git symbolic-ref HEAD refs/heads/main; }'
    - ENC_USER="${deploy_on_image_token:-}"
    - GIT_PASSWORD="${deploy_on_image_var:-}"
  script:
    - git fetch --prune "https://${ENC_USER}:${GIT_PASSWORD}@gitlab.com/a.kudryashov/image-tags.git" main
    - git reset --hard FETCH_HEAD
    - rm -f .env                        
    - cp $ENV_FILE .env
    - echo "" >> .env                 
    - cat $ENV_SYNH >> .env   
    - echo "" >> .env 
    - cat $SLACK_HOOK >> .env
    - echo "" >> .env 
    - echo "TECH_WEBHOOK=$(cat $TECH_WEBHOOK)" >> .env
    - echo " .env created"
    - echo " Installing dependencies (npm ci)..."
    - npm ci
    - rm -rf /srv/image-tags/.next
    - echo "Building..."
    - 'unset TECH_WEBHOOK && npm run build'
    - pm2 delete image-tags-app || true
    - 'unset TECH_WEBHOOK && pm2 start npm --name "image-tags-app" --cwd /srv/image-tags -- start'
    - pm2 save
  